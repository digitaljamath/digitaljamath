# Local Development Nginx Config
# Run with: nginx -c $(pwd)/nginx/nginx.local.conf
#
# URLs:
#   - http://localhost        → Landing page (static HTML)
#   - http://demo.localhost   → React app (tenant workspace)
#   - http://*.localhost      → React app (any subdomain)

worker_processes 1;
error_log /tmp/nginx_error.log;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /opt/homebrew/etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /tmp/nginx_access.log;

    # Frontend (Vite dev server)
    upstream frontend {
        server localhost:5173;
    }

    # Backend (Django dev server)
    upstream backend {
        server localhost:8000;
    }

    # ===========================================
    # Main domain - Static Landing Page
    # ===========================================
    server {
        listen 80;
        server_name localhost 127.0.0.1;

        # Static landing page
        root nginx/landing;
        index index.html;

        # Landing page routes
        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Clean URLs for onboarding
        location = /find-masjid {
            try_files /find-masjid.html =404;
        }

        # Routes handled by React app
        location /start/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /register/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location = /start {
            return 301 /start/;
        }

        location = /register {
            return 301 /register/;
        }

        # Redirect auth and dashboard to React app
        location /auth/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /dashboard/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /portal/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Vite HMR and dev assets
        location /@vite/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }

        location /node_modules/ {
            proxy_pass http://frontend;
        }

        location /@react-refresh {
            proxy_pass http://frontend;
        }

        location /src/ {
            proxy_pass http://frontend;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Django Admin
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Static files from Django
        location /static/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }
    }

    # ===========================================
    # Subdomains - Full React App (tenant workspaces)
    # e.g., demo.localhost, testmasjid.localhost
    # ===========================================
    server {
        listen 80;
        server_name ~^(?<subdomain>.+)\.localhost$;

        # All requests go to React frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # Vite HMR websocket
        location /@vite/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }

        location /node_modules/ {
            proxy_pass http://frontend;
        }

        location /src/ {
            proxy_pass http://frontend;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Django Admin
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Static files from Django
        location /static/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }
    }
}

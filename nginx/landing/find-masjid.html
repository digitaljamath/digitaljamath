<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Find Masjid...</title>
    <script>
        // Redirect to the new Unified React frontend running on port 5173 for local dev, or relative path for prod
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            window.location.replace('http://localhost:5173/find-masjid');
        } else {
            // In production, the Nginx reverse proxy routes the React app under the same domain
            window.location.replace('/find-masjid'); 
        }
    </script>
</head>
<body style="font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f9fafb; margin: 0;">
    <div style="text-align: center;">
        <h2>Connecting to DigitalJamath...</h2>
        <p style="color: #6b7280;">If you are not redirected automatically, <a href="http://localhost:5173/find-masjid" style="color: #2563eb;">click here</a>.</p>
    </div>
</body>
</html>
